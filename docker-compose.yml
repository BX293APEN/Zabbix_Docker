services:                                     # 作成したいコンテナを列挙
  zabbix-db:                                  # 作成するコンテナの名前(docker composeで管理する名前) DBコンテナ
    image: mysql:8.0                          # 使用イメージ(Docker Hub (https://hub.docker.com/) 参照)
    container_name: Zabbix_DB
    
    environment:                              # コンテナ内の環境変数を設定
      MYSQL_DATABASE:       zabbix
      MYSQL_USER:           zabbix
      MYSQL_PASSWORD:       zabbixpass
      MYSQL_ROOT_PASSWORD:  rootpass
    
    command:                                  # サービスコンテナが起動したときに実行するコマンド
      - --max_allowed_packet=64M 
      - --explicit_defaults_for_timestamp=1
      - --log-bin-trust-function-creators=1
    volumes:                                  # マウントフォルダ(実環境と共有するフォルダ)
      - ./zabbix-db:/var/lib/mysql            # ホストディレクトリ: コンテナ内ディレクトリ
      - ./zabbix-init:/docker-entrypoint-initdb.d

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10


  zabbix-server:                              # Zabbixサーバ用コンテナ
    image: zabbix/zabbix-server-mysql:alpine-7.0-latest
    container_name: Zabbix_Server
    
    environment:
      DB_SERVER_HOST:       zabbix-db
      DB_SERVER_PORT:       3306
      MYSQL_DATABASE:       zabbix
      MYSQL_USER:           zabbix
      MYSQL_PASSWORD:       zabbixpass
      
    ports:                                    # ポートを接続
      - "10051:10051"                         # ホストマシンのポート番号:コンテナのポート番号
    
    depends_on:                               # コンテナ間の依存関係を定義
      zabbix-db:                             # 先にzabbix-dbコンテナが動いていることを確認する
        condition: service_healthy

    volumes:
      - ./zabbix_server.conf:/etc/zabbix/zabbix_server.conf

    restart: unless-stopped

  zabbix-web:                                 # Webサーバ用コンテナ
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.0-latest
    container_name: Zabbix_Web
    
    environment:
      DB_SERVER_HOST:       zabbix-db
      MYSQL_USER:           zabbix
      MYSQL_PASSWORD:       zabbixpass
      MYSQL_DATABASE:       zabbix
      ZBX_SERVER_HOST:      zabbix-server
      PHP_TZ:               Asia/Tokyo
    
    ports:
      - "8080:8080"
    
    depends_on:
      zabbix-server:
        condition: service_started
      zabbix-db:
        condition: service_healthy
    
    restart: unless-stopped
