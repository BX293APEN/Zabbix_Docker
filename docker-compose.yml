services:

  zabbix-db:
    image: mysql:${MYSQL_VERSION}
    container_name: ${DB_CONTAINER_NAME}
    env_file: .env

    environment:
      MYSQL_DATABASE:       ${MYSQL_DATABASE}
      MYSQL_USER:           ${MYSQL_USER}
      MYSQL_PASSWORD:       ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD:  ${MYSQL_ROOT_PASSWORD}

    command:
      - --max_allowed_packet=64M
      - --explicit_defaults_for_timestamp=1
      - --log-bin-trust-function-creators=1

    volumes:
      - ./zabbix-db:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10


  zabbix-server:
    build:
      context: ${DOCKERFILE_DIR}            # .env で指定するビルドコンテキスト
      dockerfile: ${DOCKERFILE}             # .env で指定する Dockerfile パス
      args:
        ZABBIX_VERSION: ${ZABBIX_VERSION}   # FROM の ARG に渡してバージョンを動的に変える
        ENTRY_POINT:    ${ENTRY_POINT}
    image: zabbix-server-custom:${ZABBIX_VERSION}   # ビルド後イメージ名 (キャッシュ識別用)
    container_name: ${ZABBIX_CONTAINER_NAME}
    env_file: .env

    environment:
      DB_SERVER_HOST:   ${DB_SERVER_HOST}
      DB_SERVER_PORT:   ${DB_SERVER_PORT}
      MYSQL_DATABASE:   ${MYSQL_DATABASE}
      MYSQL_USER:       ${MYSQL_USER}
      MYSQL_PASSWORD:   ${MYSQL_PASSWORD}
      ZBX_CREATE_SQL:   ${ZBX_CREATE_SQL}

    ports:
      - "${ZBX_TRAPPER_PORT}:10051"

    depends_on:
      zabbix-db:
        condition: service_healthy          # DB healthcheck パス後に起動

    volumes:
      - ./zabbix_server.conf:/etc/zabbix/zabbix_server.conf

    restart: unless-stopped

    command:
      - /usr/local/bin/${ENTRY_POINT}


  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:${ZABBIX_VERSION}
    container_name: ${WEB_CONTAINER_NAME}
    env_file: .env

    environment:
      DB_SERVER_HOST:   ${DB_SERVER_HOST}
      MYSQL_USER:       ${MYSQL_USER}
      MYSQL_PASSWORD:   ${MYSQL_PASSWORD}
      MYSQL_DATABASE:   ${MYSQL_DATABASE}
      ZBX_SERVER_HOST:  ${ZBX_SERVER_HOST}
      PHP_TZ:           ${PHP_TZ}

    ports:
      - "${WEB_PORT}:8080"

    depends_on:
      zabbix-server:
        condition: service_started
      zabbix-db:
        condition: service_healthy

    restart: unless-stopped
